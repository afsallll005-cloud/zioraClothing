<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Checkout</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts for Premium Serif & Sans Mix -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Minimalist Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#fcfbf7] text-[#1c1c1c] min-h-screen flex items-center justify-center p-4 antialiased">

    <!-- Premium Card Container -->
    <div class="relative w-full max-w-lg bg-white rounded-3xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.06)] overflow-hidden border border-[#1c1c1c]/5">
        
        <!-- Payment Form State Container -->
        <div id="payment-form-container" class="p-8 sm:p-10 transition-all duration-500 ease-out">
            <!-- Header -->
            <div class="text-center mb-8">
                <span class="text-xs font-semibold tracking-[0.2em] uppercase text-[#1c1c1c]/50">Secure Checkout</span>
                <h2 class="serif-title text-3xl font-medium text-[#1c1c1c] mt-2">Finalize Order</h2>
            </div>

            <!-- Premium Order Summary -->
            <div class="border-y border-[#1c1c1c]/10 py-4 mb-8 flex justify-between items-center">
                <div>
                    <p class="text-xs uppercase tracking-wider text-[#1c1c1c]/40">Premium Membership</p>
                    <p class="text-xs text-[#1c1c1c]/60 mt-0.5">Billed annually. Cancel anytime.</p>
                </div>
                <p class="serif-title text-2xl font-semibold text-[#1c1c1c]">$240.00</p>
            </div>

            <!-- Form -->
            <form id="payment-form" onsubmit="handlePayment(event)" class="space-y-6" novalidate>
                <!-- Cardholder Name -->
                <div class="relative">
                    <label class="block text-xs font-semibold tracking-wider uppercase text-[#1c1c1c]/70 mb-2">Cardholder Name</label>
                    <input type="text" id="cardname" required placeholder="Alexander Mercer" 
                        class="w-full px-4 py-3 rounded-xl border border-[#1c1c1c]/15 bg-[#fcfbf7]/40 focus:outline-none focus:border-[#1c1c1c] focus:ring-1 focus:ring-[#1c1c1c] transition-all placeholder:text-[#1c1c1c]/30 font-medium">
                    <p id="error-cardname" class="text-red-600 text-xs mt-1 hidden"></p>
                </div>

                <!-- Card Number -->
                <div class="relative">
                    <label class="block text-xs font-semibold tracking-wider uppercase text-[#1c1c1c]/70 mb-2">Card Number</label>
                    <div class="relative">
                        <input type="text" id="cardnumber" required placeholder="4111 2222 3333 4444" inputmode="numeric"
                            class="w-full pl-4 pr-12 py-3 rounded-xl border border-[#1c1c1c]/15 bg-[#fcfbf7]/40 focus:outline-none focus:border-[#1c1c1c] focus:ring-1 focus:ring-[#1c1c1c] transition-all placeholder:text-[#1c1c1c]/30 font-medium tracking-wide">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-[#1c1c1c]/40">
                            <i id="card-icon" class="fa-solid fa-credit-card text-base"></i>
                        </div>
                    </div>
                    <p id="error-cardnumber" class="text-red-600 text-xs mt-1 hidden"></p>
                </div>

                <!-- Expiry & CVC Grid -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <label class="block text-xs font-semibold tracking-wider uppercase text-[#1c1c1c]/70 mb-2">Expiry Date</label>
                        <input type="text" id="cardexpiry" required placeholder="MM / YY" inputmode="numeric"
                            class="w-full px-4 py-3 rounded-xl border border-[#1c1c1c]/15 bg-[#fcfbf7]/40 focus:outline-none focus:border-[#1c1c1c] focus:ring-1 focus:ring-[#1c1c1c] transition-all placeholder:text-[#1c1c1c]/30 font-medium text-center">
                        <p id="error-cardexpiry" class="text-red-600 text-xs mt-1 hidden"></p>
                    </div>
                    <div class="relative">
                        <label class="block text-xs font-semibold tracking-wider uppercase text-[#1c1c1c]/70 mb-2">CVC / CVV</label>
                        <input type="password" id="cardcvc" required placeholder="•••" inputmode="numeric"
                            class="w-full px-4 py-3 rounded-xl border border-[#1c1c1c]/15 bg-[#fcfbf7]/40 focus:outline-none focus:border-[#1c1c1c] focus:ring-1 focus:ring-[#1c1c1c] transition-all placeholder:text-[#1c1c1c]/30 font-medium text-center tracking-widest">
                        <p id="error-cardcvc" class="text-red-600 text-xs mt-1 hidden"></p>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn"
                    class="w-full mt-4 bg-[#1c1c1c] hover:bg-[#1c1c1c]/90 text-[#fcfbf7] font-medium py-4 px-6 rounded-xl transition-all duration-300 transform active:scale-[0.99] flex items-center justify-center cursor-pointer shadow-md">
                    <span id="btn-text" class="tracking-wider uppercase text-xs font-bold">Authorize Payment • $240.00</span>
                    <span id="btn-spinner" class="hidden">
                        <i class="fa-solid fa-spinner animate-spin text-lg"></i>
                    </span>
                </button>
            </form>
        </div>

        <!-- Dynamic Premium Success Overlay -->
        <div id="success-message" class="hidden absolute inset-0 bg-white p-8 sm:p-10 flex flex-col items-center justify-center text-center transition-all duration-700 transform translate-y-8 opacity-0 ease-out">
            <!-- Sleek Success Indicator -->
            <div class="w-16 h-16 bg-[#1c1c1c] text-[#fcfbf7] rounded-full flex items-center justify-center text-xl mb-6 shadow-xl">
                <i class="fa-solid fa-check"></i>
            </div>
            
            <h3 class="serif-title text-3xl font-medium text-[#1c1c1c] mb-2">Payment Confirmed</h3>
            <p class="text-sm text-[#1c1c1c]/60 mb-8 max-w-sm leading-relaxed">Your transaction was successful. Welcome to your custom tailored membership platform.</p>
            
            <!-- Minimal Receipt -->
            <div class="w-full max-w-xs border border-[#1c1c1c]/10 rounded-2xl p-5 mb-8 text-xs space-y-3 bg-[#fcfbf7]/50">
                <div class="flex justify-between"><span class="text-[#1c1c1c]/50">Receipt Reference</span> <span class="font-medium font-mono">#PRM-7712-09</span></div>
                <div class="flex justify-between"><span class="text-[#1c1c1c]/50">Amount Paid</span> <span class="font-semibold text-base serif-title">$240.00</span></div>
                <div class="flex justify-between"><span class="text-[#1c1c1c]/50">Authorization</span> <span class="text-emerald-700 uppercase tracking-widest font-bold text-[10px]">Success</span></div>
            </div>

           <a href="./index.html"> <button class="text-xs font-bold tracking-widest uppercase text-[#1c1c1c]/60 hover:text-[#1c1c1c] transition-colors flex items-center space-x-2 cursor-pointer border-b border-transparent hover:border-[#1c1c1c]">
                <span>Back to Dashboard</span>
            </button></a>
        </div>

    </div>

    <!-- Data Validation & UI Handling Logic -->
    <script>
        const cardNameInput = document.getElementById('cardname');
        const cardNumberInput = document.getElementById('cardnumber');
        const cardExpiryInput = document.getElementById('cardexpiry');
        const cardCvcInput = document.getElementById('cardcvc');
        const cardIcon = document.getElementById('card-icon');

        // Dynamic Card Number Formatting (Adds spaces automatically)
        cardNumberInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\s+/g, '').replace(/[^0-60-9]/gi, '');
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formatted += ' ';
                formatted += value[i];
            }
            e.target.value = formatted.substring(0, 19); // Max length for 16 digits + 3 spaces

            // Dynamic card network logo switch indicator example
            if(value.startsWith('4')) {
                cardIcon.className = "fa-brands fa-cc-visa text-blue-800 text-base";
            } else if(value.match(/^5[1-5]/)) {
                cardIcon.className = "fa-brands fa-cc-mastercard text-orange-600 text-base";
            } else {
                cardIcon.className = "fa-solid fa-credit-card text-base";
            }
        });

        // Dynamic Expiry Date Formatting (Adds structural slash)
        cardExpiryInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            if (value.length > 2) {
                e.target.value = value.substring(0, 2) + ' / ' + value.substring(2, 4);
            } else {
                e.target.value = value;
            }
        });

        // Limit CVC numbers typing 
        cardCvcInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/gi, '').substring(0, 4);
        });

        // Error message display abstractor
        function showError(inputEl, msgEl, message) {
            inputEl.classList.add('border-red-500', 'focus:ring-red-500');
            msgEl.textContent = message;
            msgEl.classList.remove('hidden');
            return false;
        }

        function clearErrors() {
            const inputs = [cardNameInput, cardNumberInput, cardExpiryInput, cardCvcInput];
            inputs.forEach(input => input.classList.remove('border-red-500', 'focus:ring-red-500'));
            
            const errorMsgs = ['error-cardname', 'error-cardnumber', 'error-cardexpiry', 'error-cardcvc'];
            errorMsgs.forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        // Complete Advanced Form Validation
        function validateForm() {
            clearErrors();
            let isValid = true;

            // 1. Name validation
            if (cardNameInput.value.trim().length < 3) {
                isValid = showError(cardNameInput, document.getElementById('error-cardname'), 'Please enter a valid cardholder name.');
            }

            // 2. Card Number validation (16 digits stripped)
            const rawCard = cardNumberInput.value.replace(/\s+/g, '');
            if (!/^\d{16}$/.test(rawCard)) {
                isValid = showError(cardNumberInput, document.getElementById('error-cardnumber'), 'Card number must be exactly 16 digits.');
            }

            // 3. Expiry date validation structure
            const rawExpiry = cardExpiryInput.value.replace(/\s+/g, '');
            if (!/^\d{2}\/\d{2}$/.test(rawExpiry)) {
                isValid = showError(cardExpiryInput, document.getElementById('error-cardexpiry'), 'Use proper MM / YY format.');
            } else {
                const parts = rawExpiry.split('/');
                const month = parseInt(parts[0], 10);
                const year = parseInt('20' + parts[1], 10);
                const now = new Date();
                const currentMonth = now.getMonth() + 1;
                const currentYear = now.getFullYear();

                if (month < 1 || month > 12) {
                    isValid = showError(cardExpiryInput, document.getElementById('error-cardexpiry'), 'Invalid month.');
                } else if (year < currentYear || (year === currentYear && month < currentMonth)) {
                    isValid = showError(cardExpiryInput, document.getElementById('error-cardexpiry'), 'This card has expired.');
                }
            }

            // 4. CVC Validation
            if (!/^\d{3,4}$/.test(cardCvcInput.value)) {
                isValid = showError(cardCvcInput, document.getElementById('error-cardcvc'), 'Enter a 3 or 4 digit secure CVC.');
            }

            return isValid;
        }

        // Payment Submission Handling
        function handlePayment(event) {
            event.preventDefault();

            // Run structural data validations
            if (!validateForm()) return;

            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const formContainer = document.getElementById('payment-form-container');
            const successScreen = document.getElementById('success-message');

            // Set loading animations
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');

            // Simulate high end server handshake
            setTimeout(() => {
                formContainer.classList.add('opacity-0', 'scale-[0.98]', 'pointer-events-none');
                
                setTimeout(() => {
                    successScreen.classList.remove('hidden');
                    setTimeout(() => {
                        successScreen.classList.remove('translate-y-8', 'opacity-0');
                    }, 50);
                }, 150);
            }, 1800);
        }

        // Form loop state reset
        function resetForm() {
            const formContainer = document.getElementById('payment-form-container');
            const successScreen = document.getElementById('success-message');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            
            document.getElementById('payment-form').reset();
            cardIcon.className = "fa-solid fa-credit-card text-base";
            clearErrors();

            successScreen.classList.add('translate-y-8', 'opacity-0');
            setTimeout(() => {
                successScreen.classList.add('hidden');
                formContainer.classList.remove('opacity-0', 'scale-[0.98]', 'pointer-events-none');
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }, 400);
        }
    </script>
</body>
</html>
